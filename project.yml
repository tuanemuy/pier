name: Pier
options:
  bundleIdPrefix: app.pier
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
packages:
  PierCore:
    path: PierCore
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    exactVersion: 1.14.0
targets:
  Pier:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - Resources/Info.plist
    dependencies:
      - package: PierCore
        product: PierDomain
      - package: PierCore
        product: PierApplication
      - package: PierCore
        product: PierAdapters
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pier.client
        PRODUCT_NAME: Pier
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Resources/Info.plist
        SUPPORTS_MACCATALYST: NO
  PierTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AppTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pier
      - package: SwiftTerm
        product: SwiftTerm
  PierUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - AppUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pier
schemes:
  Pier:
    build:
      targets:
        Pier: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PierTests
        - PierUITests
